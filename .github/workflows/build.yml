name: Build and Deploy Laravel

on:
  workflow_dispatch:
  push:
    branches:
      - claude/debug-issues-QDoed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project
      run: unzip "cheapsmm-FIXED-PRODUCTION 2.zip" -d cheapsmm-panel-PRODUCTION-READY

    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, curl, openssl, zip

    - name: Install dependencies
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        composer install --no-dev --optimize-autoloader

    - name: Zip final project
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        zip -r ../project-with-vendor.zip .

    - uses: actions/upload-artifact@v4
      with:
        name: project-with-vendor
        path: project-with-vendor.zip

    - name: Upload zip via cPanel API
      run: |
        curl -sk \
          -u "${{ secrets.SSH_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
          -F "dir=/home/${{ secrets.SSH_USERNAME }}/" \
          -F "file-1=@project-with-vendor.zip" \
          -F "overwrite=1" \
          "https://${{ secrets.SSH_HOST }}:2083/execute/Fileman/upload_files" \
          | python3 -m json.tool

    - name: Extract and deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -xe
          echo "=== Starting deployment ==="
          cd /home/cheapsmm

          # Extract project
          rm -rf /home/cheapsmm/laravel-app-new
          mkdir -p /home/cheapsmm/laravel-app-new
          echo "Extracting zip..."
          unzip -o /home/cheapsmm/project-with-vendor.zip -d /home/cheapsmm/laravel-app-new
          echo "=== Extracted files ==="
          ls /home/cheapsmm/laravel-app-new

          # Move to final location
          rm -rf /home/cheapsmm/laravel-app
          mv /home/cheapsmm/laravel-app-new /home/cheapsmm/laravel-app

          # Check public dir exists
          echo "=== Laravel public dir ==="
          ls /home/cheapsmm/laravel-app/public

          # Setup .env
          cp /home/cheapsmm/laravel-app/.env.example /home/cheapsmm/laravel-app/.env
          sed -i "s|APP_URL=.*|APP_URL=https://cheapsmm.fun|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|APP_ENV=.*|APP_ENV=production|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|APP_DEBUG=.*|APP_DEBUG=false|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=cheapsmm_smm|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|DB_USERNAME=.*|DB_USERNAME=cheapsmm_smm|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=cheapsmm_smm|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|DB_HOST=.*|DB_HOST=localhost|g" /home/cheapsmm/laravel-app/.env
          sed -i "s|SESSION_DOMAIN=.*|SESSION_DOMAIN=cheapsmm.fun|g" /home/cheapsmm/laravel-app/.env
          php /home/cheapsmm/laravel-app/artisan key:generate --force

          # Permissions
          find /home/cheapsmm/laravel-app -type f -exec chmod 644 {} \;
          find /home/cheapsmm/laravel-app -type d -exec chmod 755 {} \;
          chmod -R 777 /home/cheapsmm/laravel-app/storage /home/cheapsmm/laravel-app/bootstrap/cache

          # Setup public_html - preserve directory to keep cPanel PHP handler settings
          find /home/cheapsmm/public_html -mindepth 1 -delete 2>/dev/null || true
          cp -rv /home/cheapsmm/laravel-app/public/. /home/cheapsmm/public_html/

          # Fix index.php paths (replace all __DIR__ relative paths with absolute)
          sed -i "s|__DIR__.'/../storage|'/home/cheapsmm/laravel-app/storage|g" /home/cheapsmm/public_html/index.php
          sed -i "s|__DIR__.'/../vendor|'/home/cheapsmm/laravel-app/vendor|g" /home/cheapsmm/public_html/index.php
          sed -i "s|__DIR__.'/../bootstrap|'/home/cheapsmm/laravel-app/bootstrap|g" /home/cheapsmm/public_html/index.php

          echo "=== public_html contents ==="
          ls -la /home/cheapsmm/public_html

          echo "=== index.php full content ==="
          cat /home/cheapsmm/public_html/index.php

          rm -f /home/cheapsmm/project-with-vendor.zip
          echo "=== DONE ==="
