name: Build and Deploy Laravel

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project
      run: unzip "cheapsmm-FIXED-PRODUCTION 2.zip" -d cheapsmm-panel-PRODUCTION-READY

    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, curl, openssl, zip

    - name: Install dependencies
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        composer install --no-dev --optimize-autoloader

    - name: Zip final project
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        zip -r ../project-with-vendor.zip .

    - uses: actions/upload-artifact@v4
      with:
        name: project-with-vendor
        path: project-with-vendor.zip

    - name: Upload zip via cPanel API
      run: |
        curl -sk \
          -u "${{ secrets.SSH_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
          -F "dir=/home/${{ secrets.SSH_USERNAME }}/" \
          -F "file-1=@project-with-vendor.zip" \
          "https://${{ secrets.SSH_HOST }}:2083/execute/Fileman/upload_files" \
          | python3 -m json.tool

    - name: Extract and deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          echo "=== Starting deployment ==="

          # Extract project
          rm -rf ~/laravel-app-new
          mkdir -p ~/laravel-app-new
          echo "Extracting zip..."
          unzip -o ~/project-with-vendor.zip -d ~/laravel-app-new
          echo "Extraction done. Files:"
          ls ~/laravel-app-new | head -20

          # Move to final location
          rm -rf ~/laravel-app
          mv ~/laravel-app-new ~/laravel-app
          echo "Moved to laravel-app"

          # Setup .env for cheapsmm.fun
          cd ~/laravel-app
          cp .env.example .env
          sed -i "s|APP_URL=.*|APP_URL=https://cheapsmm.fun|g" .env
          sed -i "s|APP_ENV=.*|APP_ENV=production|g" .env
          sed -i "s|APP_DEBUG=.*|APP_DEBUG=false|g" .env
          sed -i "s|SESSION_DOMAIN=.*|SESSION_DOMAIN=cheapsmm.fun|g" .env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=cheapsmm_smm|g" .env
          sed -i "s|DB_USERNAME=.*|DB_USERNAME=cheapsmm_smm|g" .env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=cheapsmm_smm|g" .env
          sed -i "s|DB_HOST=.*|DB_HOST=localhost|g" .env
          php artisan key:generate --force
          echo ".env configured"

          # Set permissions
          find ~/laravel-app -type f -exec chmod 644 {} \;
          find ~/laravel-app -type d -exec chmod 755 {} \;
          chmod -R 777 ~/laravel-app/storage ~/laravel-app/bootstrap/cache
          echo "Permissions set"

          # Set up public_html with Laravel public files
          echo "Setting up public_html..."
          ls ~/laravel-app/public
          rm -rf ~/public_html
          mkdir -p ~/public_html
          cp -r ~/laravel-app/public/. ~/public_html/
          echo "Copied public files"

          # Fix index.php to point to laravel-app
          sed -i "s|__DIR__.'/../vendor|'/home/cheapsmm/laravel-app/vendor|g" ~/public_html/index.php
          sed -i "s|__DIR__.'/../bootstrap|'/home/cheapsmm/laravel-app/bootstrap|g" ~/public_html/index.php
          echo "Fixed index.php paths"

          # Verify
          echo "=== public_html contents ==="
          ls ~/public_html
          echo "=== index.php first 10 lines ==="
          head -10 ~/public_html/index.php

          # Clean up zip
          rm -f ~/project-with-vendor.zip
          echo "=== Deployment complete! ==="
