name: Build and Deploy Laravel

on:
  workflow_dispatch:
  push:
    branches:
      - claude/debug-issues-QDoed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project
      run: unzip "cheapsmm-FIXED-PRODUCTION 2.zip" -d cheapsmm-panel-PRODUCTION-READY

    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, curl, openssl, zip

    - name: Install dependencies
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        composer install --no-dev --optimize-autoloader

    - name: Zip final project
      run: |
        cd cheapsmm-panel-PRODUCTION-READY
        zip -r ../project-with-vendor.zip .

    - uses: actions/upload-artifact@v4
      with:
        name: project-with-vendor
        path: project-with-vendor.zip

    - name: Upload zip via cPanel API
      run: |
        curl -sk \
          -u "${{ secrets.SSH_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
          -F "dir=/home/${{ secrets.SSH_USERNAME }}/" \
          -F "file-1=@project-with-vendor.zip" \
          -F "overwrite=1" \
          "https://${{ secrets.SSH_HOST }}:2083/execute/Fileman/upload_files" \
          | python3 -m json.tool

    - name: Deploy via PHP script (no SSH shell needed)
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
      run: |
        # Generate a one-time deploy token
        DEPLOY_TOKEN=$(openssl rand -hex 32)

        # Substitute placeholders into the PHP deploy script
        sed \
          -e "s|__DEPLOY_TOKEN__|${DEPLOY_TOKEN}|g" \
          -e "s|__USERNAME__|${SSH_USERNAME}|g" \
          -e "s|__DOMAIN__|cheapsmm.fun|g" \
          -e "s|__DB_DATABASE__|cheapsmm_smm|g" \
          -e "s|__DB_USERNAME__|cheapsmm_smm|g" \
          -e "s|__DB_PASSWORD__|cheapsmm_smm|g" \
          .github/deploy_script.php > /tmp/deploy.php

        # Upload PHP deploy script to public_html
        echo "=== Uploading deploy script ==="
        curl -sk \
          -u "${SSH_USERNAME}:${CPANEL_PASSWORD}" \
          -F "dir=/home/${SSH_USERNAME}/public_html/" \
          -F "file-1=@/tmp/deploy.php" \
          -F "overwrite=1" \
          "https://${SSH_HOST}:2083/execute/Fileman/upload_files" \
          | python3 -m json.tool

        # Run the deploy script via HTTP
        echo "=== Running deploy script ==="
        sleep 3
        RESULT=$(curl -sk --max-time 300 "https://cheapsmm.fun/deploy.php?t=${DEPLOY_TOKEN}")
        echo "$RESULT"

        # Check for success marker
        if echo "$RESULT" | grep -q "Deployment complete"; then
          echo "=== Deployment successful! ==="
        else
          echo "=== Deployment FAILED - check output above ==="
          exit 1
        fi
